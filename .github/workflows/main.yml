name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -H 81.181.199.140 >> ~/.ssh/known_hosts

      - name: Deploy
        run: ssh ubuntu@81.181.199.140 "cd /home/dionix && git pull && sudo npm install && sudo npm run build && sudo pm2 reload dionix-site"
